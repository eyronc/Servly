<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="12" fill="url(#logoGradient)" />

  <!-- Fork tines -->
  <line x1="14" y1="9" x2="14" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" />
  <line x1="17" y1="9" x2="17" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" />
  <line x1="20" y1="9" x2="20" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" />

  <!-- Fork handle neck -->
  <path d="M14 16 Q14 19 17 19 Q20 19 20 16" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" />
  <line x1="17" y1="19" x2="17" y2="31" stroke="white" stroke-width="1.8" stroke-linecap="round" />

  <!-- Sparkle star top-right -->
  <g transform="translate(24, 10)">
    <path d="M4 0 L4.8 2.8 L8 4 L4.8 5.2 L4 8 L3.2 5.2 L0 4 L3.2 2.8 Z" fill="white" opacity="0.95" />
  </g>

  <!-- Small sparkle dot -->
  <circle cx="28" cy="19" r="1.2" fill="white" opacity="0.6" />

  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>
</svg>